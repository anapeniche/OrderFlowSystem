services:

  postgres_orderflow:
    image: postgres:16
    container_name: postgres_orderflow
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orderflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq_broker:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq_broker
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - orderflow-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  order_api:
    build:
      context: .
      dockerfile: src/Order.API/Dockerfile
    container_name: order_api
    restart: always  
    ports:
      - "8081:8080"
    depends_on:
      postgres_orderflow:
        condition: service_healthy
      rabbitmq_broker:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST};Port=5432;Database=${DB_NAME_ORDER};Username=${DB_USER};Password=${DB_PASSWORD}
      - RabbitMQ__Host=rabbitmq_broker
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=${RABBITMQ_DEFAULT_USER}
      - RabbitMQ__Password=${RABBITMQ_DEFAULT_PASS}
    networks:
      - orderflow-network

  stock_api:
    build: 
      context: .
      dockerfile: src/Stock.API/Dockerfile
    container_name: stock_api
    restart: always
    depends_on:
      postgres_orderflow:
        condition: service_healthy
      rabbitmq_broker:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST};Port=5432;Database=${DB_NAME_STOCK};Username=${DB_USER};Password=${DB_PASSWORD}
      - RabbitMQ__Host=rabbitmq_broker
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=${RABBITMQ_DEFAULT_USER}
      - RabbitMQ__Password=${RABBITMQ_DEFAULT_PASS}
    networks:
      - orderflow-network

networks:
  orderflow-network:
    driver: bridge

volumes:
  postgres_data: