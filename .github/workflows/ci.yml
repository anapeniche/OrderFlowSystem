name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore OrderFlowSystem.sln

      - name: Build
        run: dotnet build OrderFlowSystem.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test tests/OrderFlow.IntegrationTests/OrderFlow.IntegrationTests.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.xml"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/test-results.xml'
